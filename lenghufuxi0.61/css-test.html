<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS测试</title>
    <style>
        /* 测试样式 */
        body {
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        
        .btn-challenge {
            padding: 14px 32px;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 12px;
            display: inline-block;
            width: 180px;
            text-align: center;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }
        
        .pk-btn {
            background: linear-gradient(135deg, #7c3aed, #8b5cf6, #a78bfa);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.5), 0 0 20px rgba(139, 92, 246, 0.3);
            border: 2px solid #8b5cf6;
        }
        
        .boss-btn {
            background: linear-gradient(135deg, #dc2626, #ef4444, #f87171);
            color: white;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.5), 0 0 20px rgba(239, 68, 68, 0.3);
            border: 2px solid #ef4444;
        }
    </style>
</head>
<body>
    <h1>CSS样式测试</h1>
    <button class="btn-challenge pk-btn">PK挑战</button>
    <button class="btn-challenge boss-btn">BOSS挑战</button>
</body>
</html>
